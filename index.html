<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="theme-color" content="#ffd700"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Cekih Remi"/>
  <link rel="manifest" href="manifest.json"/>
  <title>Cekih Remi</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      font-family: monospace;
      color: #e0e0e0;
      min-height: 100vh;
      padding: 16px;
      padding-bottom: 40px;
    }
    @keyframes spin {
      0%   { transform: rotate(0deg) scale(1); }
      25%  { transform: rotate(15deg) scale(1.15); }
      50%  { transform: rotate(0deg) scale(1); }
      75%  { transform: rotate(-15deg) scale(1.15); }
      100% { transform: rotate(0deg) scale(1); }
    }
    #app { max-width: 520px; margin: 0 auto; }
    .header { display: flex; justify-content: space-between; align-items: center;
      border-bottom: 2px solid #ffd700; padding-bottom: 10px; margin-bottom: 16px; }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .joker { font-size: 36px; animation: spin 3s ease-in-out infinite;
      display: inline-block; filter: drop-shadow(0 0 8px #ffd700); }
    .title { font-size: 20px; font-weight: 900; color: #ffd700; letter-spacing: 2px; line-height: 1.1; }
    .subtitle { font-size: 10px; color: #aaa; letter-spacing: 3px; text-transform: uppercase; margin-top: 2px; }
    .btn-reset { background: #ff4444; color: #fff; border: none; border-radius: 6px;
      padding: 6px 14px; cursor: pointer; font-weight: 700; font-size: 13px; }

    /* SETUP */
    .setup { display: flex; flex-direction: column; gap: 12px; }
    label { color: #aaa; font-size: 14px; display: block; margin-bottom: 4px; }
    textarea, input[type=number] {
      background: #1a1a2e; color: #e0e0e0; border: 1px solid #444;
      border-radius: 8px; padding: 10px; font-size: 15px; font-family: monospace;
      width: 100%; resize: vertical;
    }
    .btn-start { background: linear-gradient(90deg,#ffd700,#ff8c00); color: #1a1a2e;
      border: none; border-radius: 8px; padding: 12px; font-size: 16px;
      font-weight: 900; cursor: pointer; width: 100%; margin-top: 4px; }

    /* TABLE */
    .table { border-radius: 10px; overflow: hidden; border: 1px solid #333; margin-bottom: 10px; }
    .thead { display: flex; background: #0d1b2a; padding: 8px 12px;
      font-size: 11px; color: #ffd700; font-weight: 700; text-transform: uppercase; }
    .row { display: flex; align-items: center; padding: 10px 12px; gap: 8px; }
    .row:nth-child(even) { background: #1a1a2e; }
    .row:nth-child(odd)  { background: #16213e; }
    .col-name  { flex: 2; font-weight: 700; word-break: break-word; }
    .col-poin  { flex: 1; text-align: center; font-weight: 800; font-size: 18px; }
    .col-bintang { flex: 1; text-align: center; color: #ffd700; }
    .col-aksi  { flex: 3; display: flex; flex-direction: column; gap: 4px; }
    .col-aksi input { background: #0d1b2a; color: #fff; border: 1px solid #555;
      border-radius: 6px; padding: 5px 8px; font-size: 14px; font-family: monospace; width: 100%; }
    .btn-row { display: flex; gap: 4px; }
    .btn-tambah { flex:1; background:#ffd700; color:#1a1a2e; border:none; border-radius:6px;
      padding:6px 4px; font-weight:900; font-size:12px; cursor:pointer; }
    .btn-kurang { flex:1; background:#4fc3f7; color:#1a1a2e; border:none; border-radius:6px;
      padding:6px 4px; font-weight:900; font-size:12px; cursor:pointer; }
    .btn-bakar { background:#ff4444; color:#fff; border:none; border-radius:6px;
      padding:6px; font-weight:900; font-size:12px; cursor:pointer; width:100%; }

    /* RONDE */
    .ronde-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .ronde-info { font-size: 12px; color: #aaa; }
    .ronde-info span { color: #ffd700; font-weight: 900; }
    .btn-ronde { background: linear-gradient(90deg,#302b63,#4fc3f7); color:#fff; border:none;
      border-radius:6px; padding:7px 14px; font-weight:900; font-size:12px; cursor:pointer; }
    .rule { font-size: 11px; color: #666; text-align: center; margin-bottom: 10px; }

    /* LOG */
    .log-box { background: #0d1b2a; border-radius: 8px; padding: 10px 14px; border: 1px solid #333; }
    .log-title { font-size: 12px; color: #ffd700; font-weight: 700; margin-bottom: 4px; }
    .log-row { font-size: 12px; padding: 2px 0; }
    .log-star   { color: #ffd700; }
    .log-burned { color: #ff6b6b; }
    .log-minus  { color: #4fc3f7; }
    .log-normal { color: #aaa; }

    /* INSTALL BANNER */
    #install-banner { display:none; position:fixed; bottom:0; left:0; right:0;
      background:#1a1a2e; border-top:2px solid #ffd700; padding:12px 16px;
      display:flex; justify-content:space-between; align-items:center; gap:10px; z-index:999; }
    #install-banner p { font-size:13px; color:#e0e0e0; flex:1; }
    #install-banner button { background:linear-gradient(90deg,#ffd700,#ff8c00); color:#1a1a2e;
      border:none; border-radius:6px; padding:8px 14px; font-weight:900; cursor:pointer; white-space:nowrap; }
    #install-banner .close-btn { background:transparent; color:#aaa; border:none; font-size:18px; cursor:pointer; padding:0 4px; }
  </style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="header-left">
      <div class="joker">🃏</div>
      <div>
        <div class="title">CEKIH REMI</div>
        <div class="subtitle">by yoga sadewa</div>
      </div>
    </div>
    <button class="btn-reset" id="btnReset" style="display:none" onclick="resetGame()">Reset</button>
  </div>
  <div id="setup">
    <div class="setup">
      <div>
        <label>Nama pemain (pisah koma / enter):</label>
        <textarea id="nameList" rows="4" placeholder="Budi, Sari&#10;Anton&#10;Dewi"></textarea>
      </div>
      <div>
        <label>Target poin bintang:</label>
        <input type="number" id="targetInput" value="1000" placeholder="1000"/>
      </div>
      <button class="btn-start" onclick="startGame()">Mulai 🎴</button>
    </div>
  </div>
  <div id="game" style="display:none">
    <div class="table">
      <div class="thead">
        <span style="flex:2">Nama</span>
        <span style="flex:1;text-align:center">Poin</span>
        <span style="flex:1;text-align:center">★</span>
        <span style="flex:3;text-align:center">Aksi</span>
      </div>
      <div id="playerRows"></div>
    </div>
    <div class="ronde-bar">
      <div class="ronde-info">Ronde <span id="rondeNum">1</span></div>
      <button class="btn-ronde" onclick="rondeBarу()">🔄 Ronde Baru</button>
    </div>
    <div class="rule" id="ruleText"></div>
    <div class="log-box" id="logBox" style="display:none">
      <div class="log-title">Log</div>
      <div id="logRows"></div>
    </div>
  </div>
</div>

<div id="install-banner" style="display:none">
  <p>📲 Install Cekih Remi di HP kamu!</p>
  <button onclick="installApp()">Install</button>
  <button class="close-btn" onclick="document.getElementById('install-banner').style.display='none'">✕</button>
</div>

<script>
  let players = [];
  let ronde = 1;
  let target = 1000;
  let logs = [];
  let deferredPrompt = null;

  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    document.getElementById('install-banner').style.display = 'flex';
  });

  function installApp() {
    if (deferredPrompt) {
      deferredPrompt.prompt();
      deferredPrompt.userChoice.then(() => {
        deferredPrompt = null;
        document.getElementById('install-banner').style.display = 'none';
      });
    }
  }

  function startGame() {
    const raw = document.getElementById('nameList').value;
    const names = raw.split(/[\n,]+/).map(n => n.trim()).filter(Boolean);
    if (!names.length) return;
    target = parseInt(document.getElementById('targetInput').value) || 1000;
    players = names.map(name => ({ name, points: 0, stars: 0 }));
    ronde = 1;
    logs = [];
    document.getElementById('setup').style.display = 'none';
    document.getElementById('game').style.display = 'block';
    document.getElementById('btnReset').style.display = 'block';
    document.getElementById('ruleText').textContent = `Target ${target} poin = bintang balik ke 0 | Minus = aman | Bakar = langsung 0`;
    render();
  }

  function render() {
    document.getElementById('rondeNum').textContent = ronde;
    const container = document.getElementById('playerRows');
    container.innerHTML = '';
    players.forEach((p, i) => {
      const poinColor = p.points < 0 ? '#4fc3f7' : p.points === 0 ? '#888' : '#ffd700';
      const stars = p.stars > 0 ? (p.stars <= 5 ? '★'.repeat(p.stars) : `★x${p.stars}`) : '-';
      const starColor = p.stars > 0 ? '#ffd700' : '#555';
      const div = document.createElement('div');
      div.className = 'row';
      div.innerHTML = `
        <div class="col-name">${p.name}</div>
        <div class="col-poin" style="color:${poinColor}">${p.points}</div>
        <div class="col-bintang" style="color:${starColor}">${stars}</div>
        <div class="col-aksi">
          <input type="number" id="inp${i}" placeholder="poin" onkeydown="if(event.key==='Enter') tambah(${i})"/>
          <div class="btn-row">
            <button class="btn-tambah" onclick="tambah(${i})">+ Tambah</button>
            <button class="btn-kurang" onclick="kurang(${i})">- Kurang</button>
          </div>
          <button class="btn-bakar" onclick="bakar(${i})">🔥 Bakar</button>
        </div>`;
      container.appendChild(div);
    });
    renderLog();
  }

  function tambah(i) {
    const raw = parseInt(document.getElementById(`inp${i}`).value || '0');
    if (!raw || raw === 0) return;
    applyDelta(i, Math.abs(raw));
    document.getElementById(`inp${i}`).value = '';
  }

  function kurang(i) {
    const raw = parseInt(document.getElementById(`inp${i}`).value || '0');
    if (!raw || raw === 0) return;
    applyDelta(i, -Math.abs(raw));
    document.getElementById(`inp${i}`).value = '';
  }

  function applyDelta(i, delta) {
    const p = players[i];
    const before = p.points;
    const newTotal = p.points + delta;
    if (newTotal >= target) {
      p.stars += 1;
      p.points = 0;
      logs.unshift({ name: p.name, added: delta, before, after: 0, star: true });
    } else {
      p.points = newTotal;
      logs.unshift({ name: p.name, added: delta, before, after: newTotal, star: false });
    }
    render();
  }

  function bakar(i) {
    const p = players[i];
    const before = p.points;
    p.points = 0;
    logs.unshift({ name: p.name, before, after: 0, burned: true });
    render();
  }

  function rondeBarу() {
    ronde++;
    players = players.map(p => ({ ...p, points: 0 }));
    logs = [];
    render();
  }

  function resetGame() {
    players = [];
    ronde = 1;
    logs = [];
    document.getElementById('setup').style.display = 'block';
    document.getElementById('game').style.display = 'none';
    document.getElementById('btnReset').style.display = 'none';
    document.getElementById('nameList').value = '';
    document.getElementById('targetInput').value = '1000';
  }

  function renderLog() {
    if (!logs.length) { document.getElementById('logBox').style.display = 'none'; return; }
    document.getElementById('logBox').style.display = 'block';
    const container = document.getElementById('logRows');
    container.innerHTML = logs.slice(0, 10).map(l => {
      let cls, txt;
      if (l.star) { cls = 'log-star'; txt = `★ ${l.name}: ${l.before} +${l.added} → BINTANG! balik ke 0`; }
      else if (l.burned) { cls = 'log-burned'; txt = `🔥 ${l.name} TERBAKAR! ${l.before} → 0`; }
      else if (l.added < 0) { cls = 'log-minus'; txt = `${l.name}: ${l.before} ${l.added} → ${l.after}`; }
      else { cls = 'log-normal'; txt = `${l.name}: ${l.before} +${l.added} → ${l.after}`; }
      return `<div class="log-row ${cls}">${txt}</div>`;
    }).join('');
  }

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js');
  }
</script>
</body>
</html>
